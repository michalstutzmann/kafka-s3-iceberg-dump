# One-shot Job that registers the Iceberg sink connector against the Kafka
# Connect worker's REST API. Idempotent: PUT /connectors/<name>/config upserts,
# so re-running (or a Job restart) just reapplies the same config.
#
# This is where the ingest topology actually lives — catalog wiring mirrors
# IcebergCatalog.fromEnv() so the connector and the Flink maintenance jobs
# share one JDBC-catalog-on-Postgres table (db.events) on MinIO. The connector
# OWNS the table: auto-create + evolve-schema mean the schema comes from the
# JSON Schemas datagen registers, not from any hardcoded Java/SQL definition.
apiVersion: batch/v1
kind: Job
metadata:
  name: connector-setup
  namespace: s3-table-dump
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: register
          image: curlimages/curl:8.11.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              CONNECT=http://kafka-connect:8083
              SR=http://schema-registry:8081

              echo 'waiting for Kafka Connect REST...'
              until curl -sf "$CONNECT/connectors" >/dev/null 2>&1; do sleep 3; done
              echo 'waiting for Schema Registry...'
              until curl -sf "$SR/subjects" >/dev/null 2>&1; do sleep 3; done

              cat >/tmp/iceberg-sink.json <<'JSON'
              {
                "connector.class": "org.apache.iceberg.connect.IcebergSinkConnector",
                "tasks.max": "1",
                "topics": "events",
                "key.converter": "org.apache.kafka.connect.storage.StringConverter",
                "value.converter": "io.confluent.connect.json.JsonSchemaConverter",
                "value.converter.schema.registry.url": "http://schema-registry:8081",
                "iceberg.tables": "db.events",
                "iceberg.tables.auto-create-enabled": "true",
                "iceberg.tables.evolve-schema-enabled": "true",
                "iceberg.tables.default-partition-by": "event_type",
                "iceberg.control.commit.interval-ms": "60000",
                "iceberg.catalog.catalog-impl": "org.apache.iceberg.jdbc.JdbcCatalog",
                "iceberg.catalog.uri": "jdbc:postgresql://postgres:5432/iceberg",
                "iceberg.catalog.jdbc.user": "iceberg",
                "iceberg.catalog.jdbc.password": "iceberg",
                "iceberg.catalog.warehouse": "s3://warehouse",
                "iceberg.catalog.io-impl": "org.apache.iceberg.aws.s3.S3FileIO",
                "iceberg.catalog.s3.endpoint": "http://minio:9000",
                "iceberg.catalog.s3.path-style-access": "true",
                "iceberg.catalog.s3.access-key-id": "admin",
                "iceberg.catalog.s3.secret-access-key": "password",
                "iceberg.catalog.client.region": "us-east-1"
              }
              JSON

              echo 'registering iceberg-sink connector...'
              curl -sf -X PUT -H 'Content-Type: application/json' \
                --data @/tmp/iceberg-sink.json \
                "$CONNECT/connectors/iceberg-sink/config" >/dev/null
              echo 'iceberg-sink registered; current status:'
              curl -s "$CONNECT/connectors/iceberg-sink/status"
              echo
          resources:
            requests: { memory: "32Mi", cpu: "20m" }
            limits: { memory: "64Mi" }
