# Orphan-file GC as its OWN Flink Application-Mode cluster (own JM+TM pods).
# Runs only DeleteOrphanFiles. It uses the SAME Postgres maintenance lock id
# (db.events) as the rewrite/expire `maintenance` cluster, so the lock factory
# serialises orphan GC against ExpireSnapshots' deletes — fixing the S3-404
# race without giving up isolation.
#
# Ships SUSPENDED (spec.job.state) so no JM/TM pods exist by default — the
# `orphan-gc-runner` CronJob (k8s/maintenance-cron.yaml) flips state to
# `running` on its schedule and back. The in-job trigger is a short interval
# (see IcebergOrphanGcJob) so a pass fires inside the wake window even with
# `upgradeMode: stateless` (cold start each wake, no carried trigger state).
apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: orphan-gc
  namespace: s3-table-dump
spec:
  image: s3-table-dump:dev
  imagePullPolicy: Never
  flinkVersion: v2_0
  serviceAccount: flink
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "1"
    state.backend.type: hashmap
    execution.checkpointing.interval: "30s"
    classloader.parent-first-patterns.additional: "org.postgresql."
    restart-strategy.type: fixed-delay
    restart-strategy.fixed-delay.attempts: "3"
    restart-strategy.fixed-delay.delay: "5 s"
    # Tiny demo jobs (parallelism 1, hashmap state): shrink Flink's memory
    # components so a small JM/TM is a VALID layout and three isolated
    # clusters fit the node. Defaults (metaspace 256m, overhead min 192m,
    # network min 64m, managed 0.4) overflow a 512m JM / 768m TM.
    jobmanager.memory.jvm-metaspace.size: "128m"
    jobmanager.memory.off-heap.size: "64m"
    jobmanager.memory.jvm-overhead.min: "32m"
    jobmanager.memory.jvm-overhead.max: "64m"
    taskmanager.memory.jvm-metaspace.size: "128m"
    taskmanager.memory.jvm-overhead.min: "32m"
    taskmanager.memory.jvm-overhead.max: "64m"
    taskmanager.memory.framework.off-heap.size: "64m"
    taskmanager.memory.network.min: "16m"
    taskmanager.memory.network.max: "32m"
    taskmanager.memory.managed.size: "0"
  jobManager:
    resource:
      memory: "512m"
      cpu: 0.25
  taskManager:
    resource:
      memory: "768m"
      cpu: 0.25
  podTemplate:
    spec:
      containers:
        - name: flink-main-container
          env:
            - { name: S3_REGION, value: "us-east-1" }
  job:
    jarURI: local:///opt/flink/usrlib/app.jar
    entryClass: com.example.flinkiceberg.IcebergOrphanGcJob
    parallelism: 1
    upgradeMode: stateless
    # Start suspended; the orphan-gc-runner CronJob patches this to
    # `running` on schedule and back to `suspended` after the wake window.
    state: suspended
