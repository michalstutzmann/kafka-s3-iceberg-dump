# Maintenance job as its OWN Flink Application-Mode cluster (separate
# JobManager + TaskManager pods from the ingest cluster). Independent memory
# budget + failure domain — closing the "logical split only" limitation of
# the single session cluster.
#
# Runs RewriteDataFiles + ExpireSnapshots. Orphan-file removal lives in its
# own cluster (`orphan-gc`) which shares the SAME Postgres maintenance lock id
# (db.events) — that lock serialises the two maintenance graphs against each
# other. Ingest writes don't use this lock; they rely on Iceberg's normal
# optimistic commit protocol. RetryingTriggerLockFactory still absorbs the
# JDBC cold-connect race in-place on the TaskManager.
#
# The cluster ships SUSPENDED (spec.job.state) so no JM/TM pods exist by
# default — the `maintenance-runner` CronJob (k8s/maintenance-cron.yaml) flips
# state to `running` on its schedule, lets one pass complete, and flips back
# to `suspended`. With `upgradeMode: stateless` each wake is a cold start with
# no prior trigger state; that is fine here because the commit-count triggers
# below count against the table's all-time snapshot history (not since-job-
# start), so they fire on the first source tick after wake.
apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: maintenance
  namespace: s3-table-dump
spec:
  image: s3-table-dump:dev
  imagePullPolicy: Never
  flinkVersion: v2_0
  serviceAccount: flink
  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "1"
    state.backend.type: hashmap
    execution.checkpointing.interval: "30s"
    # Force the PostgreSQL driver to load from Flink's parent (system)
    # classloader — where /opt/flink/lib + java.sql.DriverManager live — so
    # the JDBC catalog never hits a child-first driver-registration race
    # ("No suitable driver found") on the JM SourceCoordinator at startup.
    classloader.parent-first-patterns.additional: "org.postgresql."
    restart-strategy.type: fixed-delay
    restart-strategy.fixed-delay.attempts: "3"
    restart-strategy.fixed-delay.delay: "5 s"
    # Tiny demo jobs (parallelism 1, hashmap state): shrink Flink's memory
    # components so a small JM/TM is a VALID layout and three isolated
    # clusters fit the node. Defaults (metaspace 256m, overhead min 192m,
    # network min 64m, managed 0.4) overflow a 512m JM / 768m TM.
    jobmanager.memory.jvm-metaspace.size: "128m"
    jobmanager.memory.off-heap.size: "64m"
    jobmanager.memory.jvm-overhead.min: "32m"
    jobmanager.memory.jvm-overhead.max: "64m"
    taskmanager.memory.jvm-metaspace.size: "128m"
    taskmanager.memory.jvm-overhead.min: "32m"
    taskmanager.memory.jvm-overhead.max: "64m"
    taskmanager.memory.framework.off-heap.size: "64m"
    taskmanager.memory.network.min: "16m"
    taskmanager.memory.network.max: "32m"
    taskmanager.memory.managed.size: "0"
  jobManager:
    resource:
      memory: "512m"
      cpu: 0.25
  taskManager:
    resource:
      memory: "768m"
      cpu: 0.5
  podTemplate:
    spec:
      containers:
        - name: flink-main-container
          env:
            - { name: S3_REGION, value: "us-east-1" }
  job:
    jarURI: local:///opt/flink/usrlib/app.jar
    entryClass: com.example.flinkiceberg.IcebergMaintenanceJob
    parallelism: 1
    upgradeMode: stateless
    # Start suspended; the maintenance-runner CronJob patches this to
    # `running` on schedule and back to `suspended` after the wake window.
    state: suspended
