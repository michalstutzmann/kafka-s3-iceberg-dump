# Apache Polaris metastore (relational-jdbc persistence): holds the POLARIS
# realm, principals, and the Iceberg catalog/table pointers. Polaris is the only
# client of this database now — ingest and maintenance reach Iceberg through
# Polaris over REST, not through a JDBC catalog. The `iceberg` database name is
# kept for continuity; k8s/polaris.yaml points QUARKUS_DATASOURCE_JDBC_URL here.
# emptyDir (demo): catalog metadata is recreated on restart (the admin-tool
# bootstrap initContainer re-seeds the realm).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: s3-table-dump
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:17.10
          env:
            - { name: POSTGRES_USER, value: iceberg }
            - { name: POSTGRES_PASSWORD, value: iceberg }
            - { name: POSTGRES_DB, value: iceberg }
            # default data dir is on the emptyDir mount below
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports:
            - { containerPort: 5432 }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "iceberg", "-d", "iceberg"] }
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 20
          resources:
            requests: { memory: "192Mi", cpu: "100m" }
            limits: { memory: "320Mi" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: s3-table-dump
spec:
  selector: { app: postgres }
  ports:
    - { port: 5432, targetPort: 5432 }
