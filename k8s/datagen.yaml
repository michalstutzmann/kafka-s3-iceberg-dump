# Synthetic event generator. The script comes from scripts/datagen.sh via a
# ConfigMap that minikube-up.sh creates with:
#   kubectl -n s3-table-dump create configmap datagen-script \
#     --from-file=datagen.sh=scripts/datagen.sh
# (kept out of this manifest so scripts/datagen.sh stays the single source.)
#
# Runs in the cp-schema-registry image because it bundles BOTH bash and
# kafka-json-schema-console-producer (the JSON Schema producer that registers
# schemas in Schema Registry). The script waits for kafka + schema-registry
# itself (bash /dev/tcp), so no init container is needed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datagen
  namespace: s3-table-dump
spec:
  replicas: 1
  selector:
    matchLabels: { app: datagen }
  template:
    metadata:
      labels: { app: datagen }
    spec:
      containers:
        - name: datagen
          image: confluentinc/cp-schema-registry:8.2.1
          command: ["bash", "/scripts/datagen.sh"]
          env:
            - { name: BROKER, value: "kafka:9092" }
            - { name: TOPIC, value: "events" }
            - { name: SR_URL, value: "http://schema-registry:8081" }
            - { name: INTERVAL, value: "0.5" }
            # events of v1 (no currency) before evolving to v2 (adds currency)
            - { name: PHASE1_COUNT, value: "60" }
          # kafka-json-schema-console-producer is a full JVM.
          resources:
            requests: { memory: "256Mi", cpu: "50m" }
            limits: { memory: "768Mi" }
          volumeMounts:
            - { name: script, mountPath: /scripts }
      volumes:
        - name: script
          configMap:
            name: datagen-script
