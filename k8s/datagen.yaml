# Synthetic event generator. The script comes from scripts/datagen.sh via a
# ConfigMap that minikube-up.sh creates with:
#   kubectl -n s3-table-dump create configmap datagen-script \
#     --from-file=datagen.sh=scripts/datagen.sh
# (kept out of this manifest so scripts/datagen.sh stays the single source).
# Runs in the apache/kafka image so kafka-console-producer is available.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datagen
  namespace: s3-table-dump
spec:
  replicas: 1
  selector:
    matchLabels: { app: datagen }
  template:
    metadata:
      labels: { app: datagen }
    spec:
      initContainers:
        - name: wait-for-kafka
          image: apache/kafka:4.0.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do
                echo 'waiting for kafka...'; sleep 3;
              done
              echo 'kafka reachable'
      containers:
        - name: datagen
          image: apache/kafka:4.0.0
          command: ["/bin/sh", "/scripts/datagen.sh"]
          env:
            - { name: BROKER, value: "kafka:9092" }
            - { name: TOPIC, value: "events" }
            - { name: INTERVAL, value: "0.5" }
          # kafka-console-producer is a full JVM — 256Mi OOM-kills it.
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits: { memory: "512Mi" }
          volumeMounts:
            - { name: script, mountPath: /scripts }
      volumes:
        - name: script
          configMap:
            name: datagen-script
