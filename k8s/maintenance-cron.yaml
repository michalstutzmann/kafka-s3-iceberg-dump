# Schedules the two Spark maintenance batches directly. Each CronJob launches
# one short-lived Spark driver in local mode:
#   - maintenance-runner: RewriteDataFiles + ExpireSnapshots
#   - orphan-gc-runner: DeleteOrphanFiles
#
# The jobs are deliberately separate pods with independent memory/CPU budgets
# and failure domains. Both Java mains take the same Postgres advisory lock
# keyed by `db.events`, so an overlapping schedule serialises orphan removal
# against rewrite/expire. Ingest writes do not use this lock; the Kafka Connect
# sink relies on Iceberg's normal optimistic commit protocol.
#
# Tuning knobs:
#   - schedule: when each batch runs.
#   - activeDeadlineSeconds: hard ceiling for a stuck Spark driver.
#   - resources: Spark driver pod budget. These are intentionally modest for
#     the small minikube demo table.
---
# Rewrite + expire. Every 30 min by default; tune by editing `schedule`.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: maintenance-runner
  namespace: s3-table-dump
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 360
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: spark
              image: s3-table-dump:dev
              imagePullPolicy: Never
              command: ["/opt/spark/bin/spark-submit"]
              args:
                - "--class"
                - "com.example.sparkiceberg.IcebergMaintenanceJob"
                - "--master"
                - "local[1]"
                - "--conf"
                - "spark.driver.memory=768m"
                - "/opt/spark/work-dir/app.jar"
              env:
                - { name: S3_REGION, value: "us-east-1" }
              resources:
                requests: { memory: "1024Mi", cpu: "500m" }
                limits: { memory: "1536Mi" }
---
# Orphan-file GC. Every 6h by default; less frequent than rewrite/expire
# because DeleteOrphanFiles lists the whole warehouse prefix and minAge keeps
# young files out of scope anyway.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: orphan-gc-runner
  namespace: s3-table-dump
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 360
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: spark
              image: s3-table-dump:dev
              imagePullPolicy: Never
              command: ["/opt/spark/bin/spark-submit"]
              args:
                - "--class"
                - "com.example.sparkiceberg.IcebergOrphanGcJob"
                - "--master"
                - "local[1]"
                - "--conf"
                - "spark.driver.memory=768m"
                - "/opt/spark/work-dir/app.jar"
              env:
                - { name: S3_REGION, value: "us-east-1" }
              resources:
                requests: { memory: "1024Mi", cpu: "500m" }
                limits: { memory: "1536Mi" }
