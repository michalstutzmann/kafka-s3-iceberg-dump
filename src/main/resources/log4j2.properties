# Used for local `java -jar` / IDE runs. Spark submit uses the Spark image's
# logging config unless this file is on the active runtime classpath.
rootLogger.level = INFO
rootLogger.appenderRef.console.ref = Console

appender.console.name = Console
appender.console.type = CONSOLE
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss.SSS} %-5p %c{1} - %m%n

logger.iceberg.name = org.apache.iceberg
logger.iceberg.level = INFO
logger.kafka.name = org.apache.kafka
logger.kafka.level = WARN
