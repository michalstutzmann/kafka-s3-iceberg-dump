# Self-contained demo stack: Kafka -> Flink -> Iceberg (on MinIO/S3).
# Ingest and Iceberg table maintenance run as two separate Flink jobs from
# the same fat jar (independent lifecycles + failure domains).
#
#   docker compose up --build
#
# The `builder` service compiles the fat jar (no local JDK/Maven needed),
# `submitter` deploys both jobs to the Flink cluster, and `datagen` streams
# events.

name: s3-table-dump

services:
  # ---------------------------------------------------------------- storage --
  minio:
    # MinIO archived its own Docker Hub repo in 2025; alpine/minio is the
    # actively-maintained community rebuild (this is the security-patched
    # Oct-2025 release). Same binary -> same command and env vars.
    image: alpine/minio:RELEASE.2025-10-15T17-29-55Z
    # alpine/minio runs as uid 100; the official image ran as root. Run as
    # root so it can write the fresh root-owned named volume.
    user: "0"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data

  minio-setup:
    # No mc needed: in MinIO's single-drive backend a top-level directory under
    # the data dir IS a bucket. Reuse the alpine/minio image's own shell to
    # create it once minio has formatted the drive (.minio.sys appears).
    image: alpine/minio:RELEASE.2025-10-15T17-29-55Z
    user: "0"
    depends_on:
      - minio
    volumes:
      - minio-data:/data
    entrypoint: >
      /bin/sh -c "
      until [ -d /data/.minio.sys ]; do
        echo 'waiting for minio to format drive...'; sleep 2;
      done;
      mkdir -p /data/warehouse;
      echo 'minio bucket ready'"

  postgres:
    image: postgres:17.10
    environment:
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg
      POSTGRES_DB: iceberg
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg -d iceberg"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ------------------------------------------------------------------ kafka --
  kafka:
    image: apache/kafka:4.0.0
    ports:
      - "29092:29092"   # host access (e.g. kafka-console-consumer from your laptop)
    environment:
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30

  kafka-setup:
    image: apache/kafka:4.0.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092
        --create --if-not-exists --topic events --partitions 3 --replication-factor 1;
      echo 'kafka topic ready'"

  # ------------------------------------------------------------------ flink --
  flink-jobmanager:
    image: flink:2.0.2-java21
    command: jobmanager
    ports:
      - "8081:8081"   # Flink Web UI
    environment:
      AWS_REGION: us-east-1
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1000m
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
        execution.checkpointing.interval: 30s
        state.backend.type: hashmap
        # Bounded recovery: any residual transient (e.g. a JDBC cold-connect
        # blip) recovers fast instead of relying on cluster defaults, and a
        # genuinely broken job fails fast instead of looping forever.
        restart-strategy.type: fixed-delay
        restart-strategy.fixed-delay.attempts: 3
        restart-strategy.fixed-delay.delay: 5 s

  flink-taskmanager:
    image: flink:2.0.2-java21
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      AWS_REGION: us-east-1
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1

  # ------------------------------------------------------- build & deploy ----
  builder:
    image: maven:3.9.9-eclipse-temurin-21
    working_dir: /src
    volumes:
      - ./:/src
      - maven-cache:/root/.m2
      - job:/out
    # APP_VERSION is interpolated by Docker Compose from the host env, so a
    # release build is: APP_VERSION=$(git-semver-release version) docker compose up --build
    command: >
      /bin/sh -c "
      mvn -q -DskipTests -Drevision='${APP_VERSION:-0.0.0-SNAPSHOT}' clean package &&
      cp /src/target/app.jar /out/app.jar &&
      echo 'fat jar built -> /out/app.jar'"

  submitter:
    image: flink:2.0.2-java21
    depends_on:
      builder:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
      minio-setup:
        condition: service_completed_successfully
      flink-jobmanager:
        condition: service_started
    environment:
      AWS_REGION: us-east-1
    volumes:
      - job:/jars:ro
    # Two jobs from one jar: the ingest job uses the jar's manifest main class
    # (KafkaToIcebergJob); the maintenance job overrides it with -c. ensureTable()
    # is idempotent so order isn't required for correctness, but submitting
    # maintenance only once ingest is RUNNING avoids two jobs deploying onto the
    # single TaskManager at the same instant (the JDBC cold-connect race).
    entrypoint: >
      /bin/bash -c "
      echo 'waiting for Flink JobManager REST...';
      until (echo > /dev/tcp/flink-jobmanager/8081) 2>/dev/null; do sleep 3; done;
      echo 'submitting ingest job';
      flink run -d -m flink-jobmanager:8081 /jars/app.jar;
      echo 'waiting for ingest job to be RUNNING...';
      until flink list -r -m flink-jobmanager:8081 2>/dev/null | grep -q 'kafka-to-iceberg'; do sleep 3; done;
      echo 'submitting maintenance job';
      flink run -d -m flink-jobmanager:8081 -c com.example.flinkiceberg.IcebergMaintenanceJob /jars/app.jar"

  # ----------------------------------------------------------- data source ---
  datagen:
    image: edenhill/kcat:1.7.1
    depends_on:
      kafka-setup:
        condition: service_completed_successfully
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/datagen.sh"]

volumes:
  minio-data:
  maven-cache:
  job:
